<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="FINANZAS V2 - Aplicación profesional de gestión financiera">
  <meta name="theme-color" content="#16211c">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2335a66f' width='100' height='100' rx='10'/><text x='50' y='60' font-size='60' font-weight='900' fill='%23092015' text-anchor='middle'>F</text></svg>">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/dark.css">
  
  <title>FINANZAS V2</title>
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">F</div>
        <div>
          <h1>FINANZAS</h1>
          <span>V2</span>
        </div>
      </div>

      <nav class="nav" id="mainNav">
        <button class="nav-btn active" data-view="dashboard">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 13h2v8H3z"></path>
            <path d="M7 8h2v13H7z"></path>
            <path d="M11 3h2v18h-2z"></path>
            <path d="M15 6h2v15h-2z"></path>
            <path d="M19 4h2v17h-2z"></path>
          </svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn" data-view="movements">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          <span>Movimientos</span>
        </button>
        <button class="nav-btn" data-view="investments">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="8" cy="8" r="5"></circle>
            <path d="M18 18c0-2.2-2.24-4-5-4s-5 1.8-5 4"></path>
            <path d="M15 6v6M12 9h6"></path>
          </svg>
          <span>Inversiones</span>
        </button>
        <button class="nav-btn" data-view="goals">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
            <path d="M12 7v5l4.28 2.54"></path>
          </svg>
          <span>Metas</span>
        </button>
        <button class="nav-btn" data-view="calculator">
          <svg class="icon" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <path d="M7 9h10M7 14h10M9 19h6M7 7v10"></path>
          </svg>
          <span>Calculadoras</span>
        </button>
        <button class="nav-btn" data-view="reports">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="13" x2="16" y2="13"></line>
            <line x1="12" y1="17" x2="16" y2="17"></line>
            <polyline points="9 13 8 12 7 13"></polyline>
            <polyline points="9 17 8 16 7 17"></polyline>
          </svg>
          <span>Reportes</span>
        </button>
      </nav>

      <div class="sidebar-bottom">
        <button class="settings-btn" id="themeToggle" title="Cambiar tema">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"></path>
            <path d="M12 2v6m0 6v6M2 12h6m6 0h6"></path>
          </svg>
        </button>
        <button class="settings-btn" id="settingsBtn" title="Configuración">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="19" cy="12" r="1"></circle>
            <circle cx="5" cy="12" r="1"></circle>
          </svg>
        </button>
      </div>

      <div class="sidebar-note">
        <small>FINANZAS V2.0</small>
        <small id="lastSync">Sin sincronizar</small>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar" id="topbar">
        <div class="title" id="viewTitle">
          <h2>Dashboard</h2>
          <p id="viewDescription">Resumen general de finanzas</p>
        </div>
        <div class="actions" id="topbarActions"></div>
      </header>

      <!-- Views Container -->
      <div class="views-container" id="viewsContainer">
        <!-- Dashboard View -->
        <section class="view active" id="dashboard-view" data-view="dashboard">
          <div id="dashboardContent"></div>
        </section>

        <!-- Movements View -->
        <section class="view" id="movements-view" data-view="movements">
          <div id="movementsContent"></div>
        </section>

        <!-- Investments View -->
        <section class="view" id="investments-view" data-view="investments">
          <div id="investmentsContent"></div>
        </section>

        <!-- Goals View -->
        <section class="view" id="goals-view" data-view="goals">
          <div id="goalsContent"></div>
        </section>

        <!-- Calculator View -->
        <section class="view" id="calculator-view" data-view="calculator">
          <div id="calculatorContent"></div>
        </section>

        <!-- Reports View -->
        <section class="view" id="reports-view" data-view="reports">
          <div id="reportsContent"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Loading indicator -->
  <div class="loading-indicator" id="loadingIndicator">
    <div class="spinner"></div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/movements.js"></script>
  <script src="js/investments.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
